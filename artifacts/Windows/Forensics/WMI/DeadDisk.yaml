name: Windows.Forensics.WMI.DeadDisk
description: |
  Enumerate carved WMI permanent event subscription evidence from an offline
  Windows disk image.

  This artifact is designed for dead disk DFIR workflows. It does not depend on
  live WMI APIs. It carves the offline WMI repository for permanent event
  subscription evidence and presents the result in an Autoruns-like way:
  what trigger appears to be bound to what consumer action.

  It provides:
  - carved FilterToConsumerBinding relationship rows when consumer and filter
    names can be extracted
  - WMI repository file inventory
  - SHA256 enrichment for repository files
  - raw observed WMI-related strings as fallback triage evidence

  Notes:
  - Permanent WMI event subscriptions are composed of __EventFilter,
    __EventConsumer, and __FilterToConsumerBinding objects.
  - Permanent subscriptions are stored in the WMI repository, not in a normal
    SOFTWARE registry tree.
  - This artifact uses conservative carving, not a full CIM repository parser.
    Rows should be treated as carved repository evidence and reviewed with the
    included evidence text.

type: CLIENT

precondition: |
  SELECT OS
  FROM info()
  WHERE OS = "windows"

parameters:
  - name: WMIObjectsDataGlobs
    type: csv
    default: |
      FileGlobs
      C:\Windows\System32\wbem\Repository\OBJECTS.DATA
      C:\Windows\System32\wbem\Repository\FS\OBJECTS.DATA

  - name: WMIRepositoryGlobs
    type: csv
    default: |
      FileGlobs
      C:\Windows\System32\wbem\Repository\OBJECTS.DATA
      C:\Windows\System32\wbem\Repository\INDEX.BTR
      C:\Windows\System32\wbem\Repository\MAPPING*.MAP
      C:\Windows\System32\wbem\Repository\RECOVER.BTR
      C:\Windows\System32\wbem\Repository\FS\**

  - name: CarveBindings
    type: bool
    default: Y

  - name: BindingRecordRegex
    type: yara
    default: |
      rule WMI_FilterToConsumerBinding_Record {
        strings:
          $BindingAscii = "_FilterToConsumerBinding" ascii nocase
          $BindingWide = "_FilterToConsumerBinding" wide nocase
        condition:
          any of them
      }

  - name: BindingContextBytes
    type: int
    default: 4096

  - name: BindingHitsPerFile
    type: int
    default: 200

  - name: EvidenceTextBytes
    type: int
    default: 2000

  - name: ScanRepositoryStrings
    type: bool
    default: Y

  - name: CalculateHashes
    type: bool
    default: Y

  - name: NumberOfHits
    type: int
    default: 50

  - name: ContextBytes
    type: int
    default: 128

  - name: WMIYaraRule
    type: yara
    default: |
      rule WMI_Repository_Observable_Strings {
        strings:
          $EventFilter = "__EventFilter" ascii wide nocase
          $FilterToConsumerBinding = "__FilterToConsumerBinding" ascii wide nocase
          $EventConsumer = "EventConsumer" ascii wide nocase
          $CommandLineEventConsumer = "CommandLineEventConsumer" ascii wide nocase
          $ActiveScriptEventConsumer = "ActiveScriptEventConsumer" ascii wide nocase
          $CommandLineTemplate = "CommandLineTemplate" ascii wide nocase
          $ScriptText = "ScriptText" ascii wide nocase
          $RootSubscriptionBackslash = "root\\subscription" ascii wide nocase
          $RootSubscriptionSlash = "root/subscription" ascii wide nocase
          $IntervalTimerInstruction = "__IntervalTimerInstruction" ascii wide nocase
          $PowerShell = "powershell" ascii wide nocase
          $CmdExe = "cmd.exe" ascii wide nocase
          $WScript = "wscript.exe" ascii wide nocase
          $CScript = "cscript.exe" ascii wide nocase
          $Mshta = "mshta.exe" ascii wide nocase
          $Rundll32 = "rundll32.exe" ascii wide nocase
          $Regsvr32 = "regsvr32.exe" ascii wide nocase
          $Win32Process = "Win32_Process" ascii wide nocase
        condition:
          any of them
      }

sources:
  - name: CarvedBindings
    query: |
      LET object_files = SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode.String AS Mode
      FROM glob(globs=WMIObjectsDataGlobs.FileGlobs)
      WHERE NOT IsDir
        AND NOT IsLink

      LET records = SELECT *
      FROM foreach(
        row=object_files,
        query={
          SELECT
            OSPath AS SourceFile,
            Name AS SourceName,
            Size AS SourceSize,
            Btime,
            Ctime,
            Mtime,
            Atime,
            Mode,
            String.Offset AS HitOffset,
            regex_replace(
              source=str(str=String.Data),
              re='[^ -~]',
              replace=''
            ) AS CleanContext,
            parse_string_with_regex(
              string=str(str=String.Data),
              regex=[
                '(?i)((?P<ConsumerNamespace>[^:]{1,200}):)?(?P<ConsumerType>[A-Za-z0-9_]*EventConsumer)\\.Name="(?P<ConsumerName>[^"]+)"',
                '(?i)((?P<FilterNamespace>[^:]{1,200}):)?_{1,2}EventFilter\\.Name="(?P<FilterName>[^"]+)"'
              ]
            ) AS Parsed
          FROM yara(
            rules=BindingRecordRegex,
            files=OSPath,
            context=BindingContextBytes,
            number=BindingHitsPerFile
          )
        }
      )

      LET parsed_rows = SELECT
        SourceFile,
        SourceName,
        SourceSize,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode,
        HitOffset,
        Parsed.ConsumerNamespace AS ConsumerNamespace,
        Parsed.ConsumerType AS ConsumerType,
        Parsed.ConsumerName AS ConsumerName,
        Parsed.FilterNamespace AS FilterNamespace,
        Parsed.FilterName AS FilterName,
        parse_string_with_regex(
          string=CleanContext,
          regex=[
            '(?i)(?P<FilterQuery>select\\s+.{1,500}?)(WQL|CommandLineEventConsumer|ActiveScriptEventConsumer|LogFileEventConsumer|NTEventLogEventConsumer|SMTPEventConsumer|$)'
          ]
        ).FilterQuery AS FilterQuery,
        parse_string_with_regex(
          string=CleanContext,
          regex=[
            '(?i)(?P<CommandOrScript>(cmd\\.exe|powershell(\\.exe)?|wscript\\.exe|cscript\\.exe|mshta\\.exe|rundll32\\.exe|regsvr32\\.exe).{0,500})'
          ]
        ).CommandOrScript AS CommandOrScript,
        substr(str=CleanContext, start=0, end=EvidenceTextBytes) AS EvidenceText
      FROM records
      WHERE Parsed.ConsumerName
        AND Parsed.FilterName

      SELECT
        format(
          format="%s-%s",
          args=[ConsumerName, FilterName]
        ) AS BindingName,
        ConsumerType,
        ConsumerName,
        ConsumerNamespace,
        CommandOrScript,
        FilterName,
        FilterNamespace,
        FilterQuery,
        SourceFile,
        SourceName,
        SourceSize,
        HitOffset,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode,
        EvidenceText,
        if(
          condition=format(format="%s-%s", args=[ConsumerName, FilterName]) =~ '^(BVTConsumer-BVTFilter|SCM Event Log Consumer-SCM Event Log Filter)$',
          then=TRUE,
          else=FALSE
        ) AS IsCommonBinding,
        "Carved from offline WMI repository; review EvidenceText because this is not a full CIM repository parse" AS Note
      FROM if(
        condition=CarveBindings,
        then=parsed_rows,
        else={
          SELECT * FROM scope() WHERE FALSE
        }
      )
      GROUP BY BindingName, SourceFile
      ORDER BY BindingName

  - name: RepositoryInventory
    query: |
      LET repo_files = SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode.String AS Mode
      FROM glob(globs=WMIRepositoryGlobs.FileGlobs)
      WHERE NOT IsDir
        AND NOT IsLink

      SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode,
        if(
          condition=CalculateHashes,
          then=hash(path=OSPath, accessor="auto")
        ) AS HashInfo
      FROM repo_files
      ORDER BY OSPath

  - name: ObservedWMIStrings
    query: |
      LET repo_files = SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime
      FROM glob(globs=WMIRepositoryGlobs.FileGlobs)
      WHERE NOT IsDir
        AND NOT IsLink

      LET hits = SELECT *
      FROM foreach(
        row=repo_files,
        query={
          SELECT
            OSPath,
            Name,
            Size,
            Btime,
            Ctime,
            Mtime,
            Atime,
            Rule,
            regex_replace(
              source=String.Name,
              re='^\\$',
              replace=''
            ) AS ObservedString,
            String.Offset AS HitOffset,
            if(
              condition=String.Name =~ 'EventFilter|FilterToConsumerBinding|EventConsumer|CommandLineEventConsumer|ActiveScriptEventConsumer|CommandLineTemplate|ScriptText|IntervalTimerInstruction',
              then="WMIEventingString",
              else=if(
                condition=String.Name =~ 'RootSubscription',
                then="WMINamespaceString",
                else=if(
                  condition=String.Name =~ 'PowerShell|CmdExe|WScript|CScript|Mshta|Rundll32|Regsvr32|Win32Process',
                  then="CommandOrProcessString",
                  else="OtherString"
                )
              )
            ) AS ObservedType,
            regex_replace(
              source=str(str=String.Data),
              re='[^ -~]',
              replace=''
            ) AS ContextText,
            "Observed string in offline WMI repository; not a reconstructed WMI binding" AS Note
          FROM yara(
            rules=WMIYaraRule,
            files=OSPath,
            context=ContextBytes,
            number=NumberOfHits
          )
        }
      )

      SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Rule,
        ObservedType,
        ObservedString,
        HitOffset,
        ContextText,
        Note
      FROM if(
        condition=ScanRepositoryStrings,
        then=hits,
        else={
          SELECT * FROM scope() WHERE FALSE
        }
      )
      ORDER BY OSPath

column_types:
  - name: Btime
    type: timestamp
  - name: Ctime
    type: timestamp
  - name: Mtime
    type: timestamp
  - name: Atime
    type: timestamp
  - name: HashInfo
    type: collapsed
