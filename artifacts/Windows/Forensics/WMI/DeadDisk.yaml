name: Windows.Forensics.WMI.DeadDisk
description: |
  Enumerate observable WMI repository evidence from an offline Windows disk image.

  This artifact is designed for dead disk DFIR workflows. It does not depend on
  live WMI APIs and does not pretend to fully parse the WMI repository. Instead
  it provides:
  - WMI repository file inventory
  - SHA256 enrichment for repository files
  - observed WMI-related strings with file offset and readable context

  Notes:
  - Permanent WMI event subscriptions are stored in the WMI repository, not in a
    normal SOFTWARE registry tree. A full reconstruction of filters, consumers,
    and bindings requires a dedicated WMI repository parser.
  - This artifact reports observed facts only. It does not assign suspicion
    priority and does not claim a persistence relationship unless the repository
    can be parsed by a future parser.

type: CLIENT

precondition: |
  SELECT OS
  FROM info()
  WHERE OS = "windows"

parameters:
  - name: WMIRepositoryGlobs
    type: csv
    default: |
      FileGlobs
      C:\Windows\System32\wbem\Repository\OBJECTS.DATA
      C:\Windows\System32\wbem\Repository\INDEX.BTR
      C:\Windows\System32\wbem\Repository\MAPPING*.MAP
      C:\Windows\System32\wbem\Repository\RECOVER.BTR
      C:\Windows\System32\wbem\Repository\FS\**

  - name: ScanRepositoryStrings
    type: bool
    default: Y

  - name: CalculateHashes
    type: bool
    default: Y

  - name: NumberOfHits
    type: int
    default: 50

  - name: ContextBytes
    type: int
    default: 128

  - name: WMIYaraRule
    type: yara
    default: |
      rule WMI_Repository_Observable_Strings {
        strings:
          $EventFilter = "__EventFilter" ascii wide nocase
          $FilterToConsumerBinding = "__FilterToConsumerBinding" ascii wide nocase
          $EventConsumer = "EventConsumer" ascii wide nocase
          $CommandLineEventConsumer = "CommandLineEventConsumer" ascii wide nocase
          $ActiveScriptEventConsumer = "ActiveScriptEventConsumer" ascii wide nocase
          $CommandLineTemplate = "CommandLineTemplate" ascii wide nocase
          $ScriptText = "ScriptText" ascii wide nocase
          $RootSubscriptionBackslash = "root\\subscription" ascii wide nocase
          $RootSubscriptionSlash = "root/subscription" ascii wide nocase
          $IntervalTimerInstruction = "__IntervalTimerInstruction" ascii wide nocase
          $PowerShell = "powershell" ascii wide nocase
          $CmdExe = "cmd.exe" ascii wide nocase
          $WScript = "wscript.exe" ascii wide nocase
          $CScript = "cscript.exe" ascii wide nocase
          $Mshta = "mshta.exe" ascii wide nocase
          $Rundll32 = "rundll32.exe" ascii wide nocase
          $Regsvr32 = "regsvr32.exe" ascii wide nocase
          $Win32Process = "Win32_Process" ascii wide nocase
        condition:
          any of them
      }

sources:
  - name: RepositoryInventory
    query: |
      LET repo_files = SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode.String AS Mode
      FROM glob(globs=WMIRepositoryGlobs.FileGlobs)
      WHERE NOT IsDir
        AND NOT IsLink

      SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Mode,
        if(
          condition=CalculateHashes,
          then=hash(path=OSPath, accessor="auto")
        ) AS HashInfo
      FROM repo_files
      ORDER BY OSPath

  - name: ObservedWMIStrings
    query: |
      LET repo_files = SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime
      FROM glob(globs=WMIRepositoryGlobs.FileGlobs)
      WHERE NOT IsDir
        AND NOT IsLink

      LET hits = SELECT *
      FROM foreach(
        row=repo_files,
        query={
          SELECT
            OSPath,
            Name,
            Size,
            Btime,
            Ctime,
            Mtime,
            Atime,
            Rule,
            regex_replace(
              source=String.Name,
              re='^\\$',
              replace=''
            ) AS ObservedString,
            String.Offset AS HitOffset,
            if(
              condition=String.Name =~ 'EventFilter|FilterToConsumerBinding|EventConsumer|CommandLineEventConsumer|ActiveScriptEventConsumer|CommandLineTemplate|ScriptText|IntervalTimerInstruction',
              then="WMIEventingString",
              else=if(
                condition=String.Name =~ 'RootSubscription',
                then="WMINamespaceString",
                else=if(
                  condition=String.Name =~ 'PowerShell|CmdExe|WScript|CScript|Mshta|Rundll32|Regsvr32|Win32Process',
                  then="CommandOrProcessString",
                  else="OtherString"
                )
              )
            ) AS ObservedType,
            regex_replace(
              source=str(str=String.Data),
              re='[^ -~]',
              replace=''
            ) AS ContextText,
            "Observed string in offline WMI repository; not a reconstructed WMI binding" AS Note
          FROM yara(
            rules=WMIYaraRule,
            files=OSPath,
            context=ContextBytes,
            number=NumberOfHits
          )
        }
      )

      SELECT
        OSPath,
        Name,
        Size,
        Btime,
        Ctime,
        Mtime,
        Atime,
        Rule,
        ObservedType,
        ObservedString,
        HitOffset,
        ContextText,
        Note
      FROM if(
        condition=ScanRepositoryStrings,
        then=hits,
        else={
          SELECT * FROM scope() WHERE FALSE
        }
      )
      ORDER BY OSPath

column_types:
  - name: Btime
    type: timestamp
  - name: Ctime
    type: timestamp
  - name: Mtime
    type: timestamp
  - name: Atime
    type: timestamp
  - name: HashInfo
    type: collapsed
