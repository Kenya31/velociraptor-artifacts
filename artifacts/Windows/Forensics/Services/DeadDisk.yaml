name: Windows.Forensics.Services.DeadDisk
description: |
  Enumerate Windows services from an offline SYSTEM hive.

  This artifact is designed for dead disk DFIR triage and improves
  accuracy by resolving the active ControlSet before enumerating services.

  Current version provides:
  - Offline service enumeration from the SYSTEM hive
  - ControlSet resolution via Select\Current
  - ImagePath and optional ServiceDll extraction
  - Conservative path normalization for executable and DLL paths
  - File metadata, SHA256, and Authenticode information when referenced files exist
  - Notes when resolved executable or DLL paths are not present on disk

  Notes:
  - ResolvedExePath and ResolvedDllPath are normalized investigation paths.
    They may not always represent the final runtime payload in complex service setups.
  - Hash and signature fields may be empty when the referenced file is missing,
    unresolved, or unsupported for signature parsing.

type: CLIENT

precondition: |
  SELECT OS
  FROM info()
  WHERE OS = "windows"

parameters:
  - name: SystemHivePath
    default: C:/Windows/System32/config/SYSTEM

  - name: ControlSet
    description: "Optional override. If empty, resolve from Select\\Current"
    default: ""

  - name: Calculate_hashes
    default: Y
    type: bool

  - name: CertificateInfo
    default: Y
    type: bool

  - name: NameRegex
    default: .
    type: regex

sources:
  - query: |
      -- 1. Resolve ControlSet
      LET current_controlset_row = SELECT Current
      FROM read_reg_key(
        globs=["Select"],
        root=pathspec(DelegatePath=SystemHivePath),
        accessor="raw_reg"
      )

      LET resolved_controlset = SELECT
        if(
          condition=ControlSet,
          then=ControlSet,
          else=format(format="ControlSet%03d", args=Current)
        ) AS ControlSetName
      FROM current_controlset_row

      -- 2. Enumerate service keys
      LET service_step1 = SELECT *
      FROM foreach(
        row=resolved_controlset,
        query={
          SELECT
            Name,
            Mtime AS LastWriteTime,
            {
              SELECT DisplayName
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS DisplayName,
            {
              SELECT Description
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS Description,
            {
              SELECT ImagePath
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS RawPathName,
            {
              SELECT Start
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS StartValue,
            {
              SELECT Type
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS TypeValue,
            {
              SELECT ObjectName
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS UserAccount,
            {
              SELECT ServiceDll
              FROM read_reg_key(
                globs=[ControlSetName + "\\Services\\" + Name + "\\Parameters"],
                root=pathspec(DelegatePath=SystemHivePath),
                accessor="raw_reg"
              )
            } AS RawServiceDll
          FROM glob(
            globs=ControlSetName + "\\Services\\*",
            root=pathspec(DelegatePath=SystemHivePath),
            accessor="raw_reg"
          )
          WHERE Data.type =~ "Key"
            AND Name =~ NameRegex
        }
      )

      -- 3. Extract executable path from ImagePath
      LET service_step2 = SELECT *,
        parse_string_with_regex(
          regex=['^"(?P<P>[^"]+)', '(?P<P>^[^ "]+)'],
          string=RawPathName
        ).P AS CleanExePath
      FROM service_step1

      -- 4. Resolve common path patterns
      LET service_step3 = SELECT *,
        if(
          condition=CleanExePath,
          then=if(
            condition=CleanExePath =~ '(?i)^(%SystemRoot%|%windir%|\\\\SystemRoot)',
            then=regex_replace(
              source=CleanExePath,
              re='(?i)^(%SystemRoot%|%windir%|\\\\SystemRoot)',
              replace='C:\\Windows'
            ),
            else=if(
              condition=CleanExePath =~ '(?i)^system32',
              then='C:\\Windows\\' + CleanExePath,
              else=CleanExePath
            )
          )
        ) AS ResolvedExePath,

        if(
          condition=RawServiceDll,
          then=if(
            condition=RawServiceDll =~ '(?i)^(%SystemRoot%|%windir%|\\\\SystemRoot)',
            then=regex_replace(
              source=RawServiceDll,
              re='(?i)^(%SystemRoot%|%windir%|\\\\SystemRoot)',
              replace='C:\\Windows'
            ),
            else=if(
              condition=RawServiceDll =~ '(?i)^system32',
              then='C:\\Windows\\' + RawServiceDll,
              else=RawServiceDll
            )
          )
        ) AS ResolvedDllPath
      FROM service_step2

      -- 5. Collect file metadata before enrichment
      LET service_step4 = SELECT *,
        if(
          condition=ResolvedExePath,
          then={
            SELECT
              Size,
              Btime,
              Ctime,
              Mtime,
              Atime,
              Mode.String AS Mode
            FROM stat(filename=ResolvedExePath, accessor="auto")
          }
        ) AS ServiceExeFileInfo,

        if(
          condition=ResolvedDllPath,
          then={
            SELECT
              Size,
              Btime,
              Ctime,
              Mtime,
              Atime,
              Mode.String AS Mode
            FROM stat(filename=ResolvedDllPath, accessor="auto")
          }
        ) AS ServiceDllFileInfo
      FROM service_step3

      -- 6. Final output
      SELECT
        Name,
        DisplayName,
        Description,

        if(condition=NOT StartValue, then="",
        else=if(condition=StartValue = 0, then="SERVICE_BOOT_START",
        else=if(condition=StartValue = 1, then="SERVICE_SYSTEM_START",
        else=if(condition=StartValue = 2, then="SERVICE_AUTO_START",
        else=if(condition=StartValue = 3, then="SERVICE_DEMAND_START",
        else=if(condition=StartValue = 4, then="SERVICE_DISABLED",
        else=format(format="%v", args=StartValue))))))) AS StartMode,

        if(
          condition=TypeValue,
          then=format(format="0x%x", args=TypeValue),
          else=""
        ) AS ServiceTypeRaw,

        if(condition=NOT TypeValue, then="",
        else=if(condition=TypeValue = 1, then="SERVICE_KERNEL_DRIVER",
        else=if(condition=TypeValue = 2, then="SERVICE_FILE_SYSTEM_DRIVER",
        else=if(condition=TypeValue = 4, then="SERVICE_ADAPTER",
        else=if(condition=TypeValue = 8, then="SERVICE_RECOGNIZER_DRIVER",
        else=if(condition=TypeValue = 16, then="SERVICE_WIN32_OWN_PROCESS",
        else=if(condition=TypeValue = 32, then="SERVICE_WIN32_SHARE_PROCESS",
        else=if(condition=TypeValue = 80, then="SERVICE_USER_OWN_PROCESS",
        else=if(condition=TypeValue = 96, then="SERVICE_USER_SHARE_PROCESS",
        else=if(condition=TypeValue = 208, then="SERVICE_USER_OWN_PROCESS | SERVICE_INTERACTIVE_PROCESS",
        else=if(condition=TypeValue = 224, then="SERVICE_USER_SHARE_PROCESS | SERVICE_INTERACTIVE_PROCESS",
        else=if(condition=TypeValue = 256, then="SERVICE_INTERACTIVE_PROCESS",
        else=if(condition=TypeValue = 272, then="SERVICE_WIN32_OWN_PROCESS | SERVICE_INTERACTIVE_PROCESS",
        else=if(condition=TypeValue = 288, then="SERVICE_WIN32_SHARE_PROCESS | SERVICE_INTERACTIVE_PROCESS",
        else=format(format="0x%x", args=TypeValue))))))))))))))) AS ServiceTypeFlags,

        RawPathName AS ImagePath,
        ResolvedExePath,
        RawServiceDll AS ServiceDllPath,
        ResolvedDllPath,
        UserAccount,
        LastWriteTime,
        ServiceExeFileInfo,
        ServiceDllFileInfo,

        if(
          condition=Calculate_hashes AND ResolvedExePath AND ServiceExeFileInfo,
          then=hash(path=ResolvedExePath, accessor="auto")
        ) AS HashServiceExe,

        if(
          condition=CertificateInfo AND ResolvedExePath AND ServiceExeFileInfo,
          then=authenticode(filename=ResolvedExePath)
        ) AS CertinfoServiceExe,

        if(
          condition=Calculate_hashes AND ResolvedDllPath AND ServiceDllFileInfo,
          then=hash(path=ResolvedDllPath, accessor="auto")
        ) AS HashServiceDll,

        if(
          condition=CertificateInfo AND ResolvedDllPath AND ServiceDllFileInfo,
          then=authenticode(filename=ResolvedDllPath)
        ) AS CertinfoServiceDll,

        if(
          condition=ResolvedExePath AND NOT ServiceExeFileInfo,
          then="Resolved service executable not found on disk image"
        ) AS NoteServiceExe,

        if(
          condition=ResolvedDllPath AND NOT ServiceDllFileInfo,
          then="Resolved service DLL not found on disk image"
        ) AS NoteServiceDll

      FROM service_step4

column_types:
  - name: LastWriteTime
    type: timestamp
  - name: ServiceExeFileInfo
    type: collapsed
  - name: ServiceDllFileInfo
    type: collapsed
  - name: CertinfoServiceExe
    type: collapsed
  - name: CertinfoServiceDll
    type: collapsed
